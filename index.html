<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Dota 2: Legendary Gift</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Roboto:wght@400&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0d1117; --gold: #e5c07b; --red: #c23c2a; --panel: rgba(22, 27, 34, 0.9); }
        body { margin: 0; background: var(--bg); font-family: 'Roboto', sans-serif; color: #e2d6b5; overflow-x: hidden; }

        /* ЭКРАН ВХОДА */
        #start-overlay { position: fixed; inset: 0; background: black; z-index: 9999; display: flex; justify-content: center; align-items: center; text-align: center; }
        .overlay-content h1 { font-family: 'Cinzel', serif; color: var(--gold); font-size: 2.5rem; margin-bottom: 30px; text-shadow: 0 0 10px var(--red); }
        button { background: var(--red); color: white; border: none; padding: 15px 40px; font-family: 'Cinzel', serif; font-size: 1.2rem; cursor: pointer; border-radius: 5px; transition: 0.3s; text-transform: uppercase; }
        button:hover { background: #e53935; box-shadow: 0 0 20px var(--red); transform: scale(1.05); }

        /* ДОЖДЬ ИЗ ФОТО */
        .falling-photo { position: fixed; top: -200px; width: 120px; height: 160px; object-fit: cover; border: 2px solid var(--gold); opacity: 0.5; z-index: 50; animation: fall linear forwards; pointer-events: none; }
        @keyframes fall { to { transform: translateY(110vh); } }

        /* КОНТЕНТ */
        .content { padding: 50px 20px; max-width: 600px; margin: 0 auto; display: none; }
        h1 { font-family: 'Cinzel', serif; color: var(--gold); text-align: center; border-bottom: 2px solid var(--red); padding-bottom: 10px; }
        .step { background: var(--panel); padding: 30px; border-radius: 10px; border: 1px solid #333; margin-top: 20px; display: none; }
        .step.active { display: block; animation: fadeIn 0.5s; }
        input { width: 100%; padding: 10px; background: #000; border: 1px solid var(--gold); color: white; border-radius: 4px; margin-top: 10px; }
        .submit-btn { margin-top: 15px; width: 100%; }
        
        #final-prize { text-align: center; display: none; margin-top: 30px; padding: 30px; border: 2px solid var(--gold); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="start-overlay">
        <div class="overlay-content">
            <h1>Поздравляю вас Илья и Алиса<br>с днем рождения!!</h1>
            <button onclick="startExperience()">Вперед</button>
        </div>
    </div>

    <!-- МУЗЫКА -->
    <audio id="audio" loop>
        <source src="Gorillaz.mp3" type="audio/mpeg">
    </audio>

    <div class="content" id="main-content">
        <h1>Тайная Лавка</h1>
        
        <!-- КВИЗ -->
        <div id="step1" class="step active">
            <p>Вопрос 1: Впиши сюда свой вопрос?</p>
            <input type="text" id="answer1" placeholder="Ответ...">
            <button class="submit-btn" onclick="checkAnswer(1)">Проверить</button>
        </div>

        <div id="step2" class="step">
            <p>Вопрос 2: Впиши сюда свой вопрос?</p>
            <input type="text" id="answer2" placeholder="Ответ...">
            <button class="submit-btn" onclick="checkAnswer(2)">Проверить</button>
        </div>

        <!-- ФИНАЛ -->
        <div id="final-prize" class="step">
            <h2>GG WP! Защита снята</h2>
            <p>Ваш код от замка:</p>
            <h1 style="font-size: 3rem; margin: 20px 0;">732</h1>
        </div>
    </div>

    <script>
        const audio = document.getElementById('audio');
        const photoFiles = ['photo1.jpg', 'photo2.jpg', 'photo3.jpg']; // Названия твоих фото на GitHub
        const answers = { 1: "ответ1", 2: "ответ2" }; // Твои ответы

        function startExperience() {
            audio.volume = 0.5;
            audio.play();
            document.getElementById('start-overlay').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            createFallingPhotos();
        }

        function createFallingPhotos() {
            photoFiles.forEach((file, index) => {
                const img = document.createElement('img');
                img.src = file;
                img.className = 'falling-photo';
                img.style.left = Math.random() * 80 + 10 + 'vw';
                img.style.animationDuration = (Math.random() * 5 + 7) + 's';
                img.style.animationDelay = (index * 1.5) + 's';
                document.body.appendChild(img);
            });
        }

        function checkAnswer(step) {
            const val = document.getElementById('answer' + step).value.toLowerCase().trim();
            if (val === answers[step]) {
                document.getElementById('step' + step).style.display = 'none';
                if (step < 2) document.getElementById('step' + (step + 1)).classList.add('active');
                else document.getElementById('final-prize').classList.add('active');
            } else {
                alert("Неверно, герой! Попробуй еще раз.");
            }
        }
    </script>
</body>
</html>
