<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Dota 2: Legendary Birthday Quest</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@900&family=Roboto:wght@400&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0d1117; --gold: #e5c07b; --red: #c23c2a; }
        body { margin: 0; background: var(--bg); font-family: 'Roboto', sans-serif; color: #e2d6b5; overflow: hidden; min-height: 100vh; }

        #start-overlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; justify-content: center; align-items: center; text-align: center; }
        .overlay-content h1 { font-family: 'Cinzel', serif; font-size: 4rem; color: #fff; text-shadow: 0 0 20px var(--gold); }
        button { background: transparent; color: var(--gold); border: 2px solid var(--gold); padding: 30px 80px; font-family: 'Cinzel', serif; font-size: 2rem; cursor: pointer; border-radius: 10px; transition: 0.3s; }
        button:hover { background: var(--gold); color: black; transform: scale(1.1); }

        .lane-container { position: fixed; bottom: 40px; left: 10%; width: 80%; height: 100px; z-index: 50; display: flex; align-items: center; }
        .lane-line { position: absolute; width: 100%; height: 6px; background: #222; top: 60%; z-index: 1; border-radius: 3px; }
        .checkpoint { width: 30px; height: 30px; background: var(--red); clip-path: polygon(0% 0%, 100% 50%, 0% 100%); z-index: 2; opacity: 0.3; transition: 0.3s; }
        .checkpoint.active { opacity: 1; box-shadow: 0 0 15px var(--red); }
        .lock-icon { font-size: 2.5rem; margin-left: auto; z-index: 2; }

        .avatar { 
            position: absolute; width: 60px; height: 60px; border: 3px solid var(--gold); 
            border-radius: 50%; z-index: 3; transition: left 0.8s ease-in-out;
            background-color: #ffd8b1; overflow: hidden; box-shadow: 0 0 15px rgba(0,0,0,0.8);
            animation: run 0.4s infinite alternate;
        }
        .hair { position: absolute; top: 0; left: 0; width: 100%; height: 50%; border-radius: 50% 50% 0 0; }
        .ilya-hair { background-color: #1a1a1a; }
        .alice-hair { background-color: #ff85c1; }
        @keyframes run { 0% { transform: translateY(0) rotate(-5deg); } 50% { transform: translateY(-12px) rotate(5deg); } 100% { transform: translateY(0) rotate(-5deg); } }

        /* Фото теперь полностью прозрачные по умолчанию */
        .falling-photo { position: fixed; z-index: 1; pointer-events: none; opacity: 0; transition: opacity 1s ease; }

        .content { position: relative; z-index: 10; padding: 50px 20px; max-width: 800px; margin: 0 auto; display: none; }
        h1 { font-family: 'Cinzel', serif; color: var(--gold); text-align: center; border-bottom: 2px solid var(--red); }
        .step { background: rgba(22, 27, 34, 0.9); padding: 50px; border-radius: 15px; border: 2px solid #333; margin-top: 30px; display: none; }
        .step.active { display: block; }
        input { width: 100%; padding: 24px; font-size: 1.5rem; background: #000; border: 2px solid var(--gold); color: white; border-radius: 8px; box-sizing: border-box; margin-bottom: 20px; }
        .submit-btn { width: 100%; padding: 24px; font-size: 1.5rem; background: var(--red); color: white; border: none; cursor: pointer; border-radius: 8px; font-family: 'Cinzel', serif; }
        
        #reveal-img { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100px; height: 100px; z-index: 10000; opacity: 0; transition: all 4s ease-in-out; border: 5px solid var(--gold); display: none; }
        #reveal-img.expanded { width: 100vw; height: 100vh; opacity: 1; }
    </style>
</head>
<body>

    <div id="start-overlay">
        <div class="overlay-content">
            <h1>Congrats Илья and Алиса<br>happy birthday</h1>
            <button onclick="startExperience()">Вперед</button>
        </div>
    </div>

    <audio id="audio" loop></audio>
    <img id="reveal-img" src="a1.jpg">

    <div class="lane-container" id="progress">
        <div class="lane-line"></div>
        <div class="checkpoint active"></div><div class="checkpoint"></div><div class="checkpoint"></div>
        <div class="checkpoint"></div><div class="checkpoint"></div><div class="checkpoint"></div>
        <div class="checkpoint"></div><div class="checkpoint"></div><div class="checkpoint"></div>
        <div class="checkpoint"></div>
        <div class="lock-icon">🔒</div>
        
        <div class="avatar" id="avatar-ilya" style="left: 0%;"><div class="hair ilya-hair"></div></div>
        <div class="avatar" id="avatar-alice" style="left: 0%;"><div class="hair alice-hair"></div></div>
    </div>

    <div class="content" id="main-content">
        <h1>Тайная Лавка</h1>
        <div id="quiz-area"></div>
    </div>

    <script>
        const audio = document.getElementById('audio');
        const playlist = ["Bodies.mp3", "Gorillaz.mp3", "Nickelback.mp3"];
        let currentTrack = 0;
        let currentStep = 1;

        const quizData = [
            { q: "Кто озвучивает фразу 'я люблю когда гмом'?", a: ["анастасия"] },
            { q: "Вопрос 2", a: ["ответ2"] },
            { q: "Вопрос 3", a: ["ответ3"] },
            { q: "Вопрос 4", a: ["ответ4"] },
            { q: "Вопрос 5", a: ["ответ5"] },
            { q: "Вопрос 6", a: ["ответ6"] },
            { q: "Вопрос 7", a: ["ответ7"] },
            { q: "Вопрос 8", a: ["ответ8"] },
            { q: "Вопрос 9", a: ["ответ9"] },
            { q: "Вопрос 10", a: ["ответ10"] }
        ];

        const quizArea = document.getElementById('quiz-area');
        quizData.forEach((item, index) => {
            const stepDiv = document.createElement('div');
            stepDiv.className = 'step';
            stepDiv.id = 'step' + (index + 1);
            if(index === 0) stepDiv.classList.add('active');
            stepDiv.innerHTML = `<p style="font-size: 1.5rem;">${item.q}</p><input type="text" id="answer${index + 1}" placeholder="Ответ..."><button class="submit-btn" onclick="checkAnswer(${index + 1})">Проверить</button>`;
            quizArea.appendChild(stepDiv);
        });

        // Функция спавна фото
        function spawnPhoto() {
            const i = Math.floor(Math.random() * 23) + 1;
            const img = document.createElement('img');
            img.src = `p${i}.jpg`;
            img.className = 'falling-photo';
            img.style.left = (Math.random() * 80) + 'vw';
            img.style.width = (Math.floor(Math.random() * 300) + 300) + 'px';
            img.style.top = '-800px';
            document.body.appendChild(img);
            
            // Запуск анимации
            setTimeout(() => {
                img.style.animation = `fall ${Math.random() * 5 + 5}s linear`;
                img.style.opacity = '0.08';
            }, 50);
            
            // Удаление фото после анимации
            img.addEventListener('animationend', () => img.remove());
        }

        function startExperience() {
            audio.volume = 0.15;
            audio.src = playlist[currentTrack];
            audio.play();
            document.getElementById('start-overlay').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            
            // Запускаем бесконечный спавн фото
            setInterval(spawnPhoto, 1500); 
        }

        async function checkAnswer(step) {
            const val = document.getElementById('answer' + step).value.toLowerCase().trim();
            if (quizData[step-1].a.includes(val)) {
                if (step === 1) {
                    audio.pause();
                    const quote = new Audio('gol.mp3');
                    const img = document.getElementById('reveal-img');
                    img.style.display = 'block';
                    setTimeout(() => img.classList.add('expanded'), 50);
                    quote.play();
                    quote.onended = () => { img.classList.remove('expanded'); img.style.display = 'none'; audio.play(); nextStep(); };
                } else { nextStep(); }
            } else { alert("Неверно!"); }
        }

        function nextStep() {
            document.getElementById('step' + currentStep).style.display = 'none';
            currentStep++;
            if (currentStep <= 10) {
                document.getElementById('step' + currentStep).classList.add('active');
                const pos = (currentStep - 1) * 8.5;
                document.getElementById('avatar-ilya').style.left = pos + '%';
                document.getElementById('avatar-alice').style.left = (pos + 2) + '%';
                const flags = document.querySelectorAll('.checkpoint');
                flags[currentStep - 1].classList.add('active');
            } else {
                alert("GG WP! Защита снята. Код: 732");
            }
        }

        const style = document.createElement('style');
        style.innerHTML = `@keyframes fall { from { top: -800px; } to { top: 110vh; } }`;
        document.head.appendChild(style);
    </script>
</body>
</html>
