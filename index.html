<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Dota 2: Legendary Quest</title>
    
    <link rel="preload" href="a1.jpg" as="image">
    <link rel="preload" href="a2.png" as="image">
    <link rel="preload" href="bu.mp4" as="video">
    <link rel="preload" href="gol.mp3" as="audio">
    <link rel="preload" href="Privet.mp3" as="audio">
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@900&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0d1117; --gold: #e5c07b; --red: #c23c2a; --terminal-green: #4af626; }
        body { margin: 0; background: var(--bg); font-family: 'Roboto', sans-serif; color: #e2d6b5; overflow: hidden; min-height: 100vh; }

        /* ЭКРАН ЗАГРУЗКИ */
        #start-overlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .overlay-content h1 { font-family: 'Cinzel', serif; font-size: 4rem; color: #fff; text-shadow: 0 0 20px var(--gold); margin-bottom: 20px; }
        
        button { background: transparent; color: var(--gold); border: 2px solid var(--gold); padding: 15px 50px; font-family: 'Cinzel', serif; font-size: 1.5rem; cursor: pointer; border-radius: 10px; transition: 0.3s; margin-bottom: 25px; }
        button:hover:not(:disabled) { background: var(--gold); color: black; box-shadow: 0 0 15px var(--gold); }
        button:disabled { border-color: #555; color: #555; cursor: not-allowed; }
        
        /* ТЕРМИНАЛ ЗАГРУЗКИ */
        #terminal { 
            width: 90%; max-width: 800px; height: 320px; background: rgba(10, 15, 20, 0.95); 
            border: 2px solid #333; border-radius: 8px; padding: 25px; 
            text-align: left; font-family: 'Courier New', Courier, monospace; font-size: 1.2rem; 
            color: var(--terminal-green); overflow-y: auto; box-shadow: inset 0 0 20px #000, 0 0 15px rgba(74, 246, 38, 0.1);
            line-height: 1.6;
        }
        #terminal::-webkit-scrollbar { width: 8px; }
        #terminal::-webkit-scrollbar-track { background: #111; }
        #terminal::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }

        .log-line { margin-bottom: 8px; opacity: 0; animation: typeLine 0.1s forwards; text-shadow: 0 0 5px var(--terminal-green); }
        @keyframes typeLine { to { opacity: 1; } }
        .log-warn { color: #e5c07b; text-shadow: 0 0 5px #e5c07b; font-weight: bold; }
        .log-err { color: var(--red); text-shadow: 0 0 5px var(--red); font-weight: bold; }

        /* ТРОПА И ФЛАЖКИ */
        .lane-container { position: fixed; bottom: 50px; left: 10%; width: 80%; height: 120px; z-index: 50; display: flex; align-items: center; justify-content: space-between; }
        .lane-line { position: absolute; width: 100%; height: 10px; background: #1a1a1a; top: 50%; z-index: 1; border-radius: 5px; border: 1px solid #333; box-shadow: inset 0 2px 5px #000; }
        
        .checkpoint { width: 8px; height: 40px; background: #444; z-index: 2; transition: 0.3s; position: relative; border-radius: 2px; }
        .checkpoint::before { content: ''; position: absolute; top: -14px; left: 0; width: 22px; height: 14px; background: var(--red); display: none; clip-path: polygon(0 0, 100% 50%, 0 100%); }
        .checkpoint.active { background: var(--gold); box-shadow: 0 0 15px var(--gold); }
        .checkpoint.active::before { display: block; }
        
        /* СИММЕТРИЧНЫЙ ЗАМОК */
        .lock { width: 34px; height: 26px; background: #e5c07b; border-radius: 6px; position: relative; box-shadow: 0 0 15px var(--gold); z-index: 2; display: flex; justify-content: center; align-items: center; }
        .lock::before { content: ''; position: absolute; width: 18px; height: 16px; border: 5px solid #e5c07b; border-bottom: none; border-radius: 14px 14px 0 0; top: -16px; left: 50%; transform: translateX(-50%); box-sizing: border-box; }
        .lock::after { content: ''; width: 6px; height: 10px; background: #0d1117; border-radius: 3px; }

        /* АВАТАРЫ */
        .avatar { 
            position: absolute; width: 45px; height: 45px; border: 2px solid var(--gold); 
            z-index: 10; transition: left 0.8s ease-in-out, transform 0.3s ease;
            display: flex; align-items: center; justify-content: center; 
            font-size: 10px; font-weight: bold; color: #fff; text-shadow: 1px 1px 2px #000;
            border-radius: 4px; cursor: help; box-shadow: 0 0 10px rgba(0,0,0,0.5);
            text-align: center; padding: 2px;
        }
        .avatar:hover { transform: scale(1.1); z-index: 11; }
        .running { transform: rotate(20deg) skewX(-10deg) !important; }
        
        /* ТУЛТИПЫ */
        .tooltip { 
            visibility: hidden; width: 450px; max-width: 80vw;
            background-color: rgba(0,0,0,0.95); color: #fff; text-align: center; 
            border-radius: 12px; padding: 25px; position: absolute; z-index: 100; 
            bottom: 140%; left: 50%; transform: translateX(-50%);
            font-size: 20px; border: 2px solid var(--gold); line-height: 1.5; 
            box-shadow: 0 0 20px var(--gold); opacity: 0; transition: opacity 0.3s;
        }
        .avatar:hover .tooltip { visibility: visible; opacity: 1; }
        
        .ilya { background-color: #a33; top: 0px; }
        .alice { background-color: #337ab7; top: 60px; }

        /* ФОТО */
        .falling-photo { position: fixed; z-index: 1; pointer-events: none; opacity: 0; will-change: transform, top, left; }
        
        /* КОНТЕНТ В ЦЕНТРЕ */
        .content { 
            position: fixed; top: 45%; left: 50%; transform: translate(-50%, -50%); 
            z-index: 10; width: 90%; max-width: 800px; 
            text-align: center; display: none; 
        }
        
        /* ОКОШКО ВОПРОСА (ОЧЕНЬ БЫСТРЫЙ И РЕЗКИЙ ВИЗУАЛИЗАТОР) */
        .step { 
            background: rgba(0, 0, 0, 0.9); padding: 40px; 
            border-radius: 15px; border: 2px solid #444; margin-top: 20px; 
            display: none; transform-origin: center center;
            /* Ускоряем transition для мгновенного отклика на бит */
            transition: box-shadow 0.05s ease-out, transform 0.05s ease-out, border-color 0.05s ease-out; 
        }
        .step.active { display: block; animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        
        .step p { font-size: 1.8rem; margin-bottom: 30px; color: #fff; line-height: 1.4; }
        
        input { 
            width: 100%; padding: 18px; background: #111; border: 2px solid #444; 
            color: white; border-radius: 8px; margin-bottom: 25px; 
            font-size: 1.5rem; text-align: center; box-sizing: border-box; transition: 0.3s;
        }
        input:focus { outline: none; border-color: var(--gold); }
        input::placeholder { color: #666; }
        
        .submit-btn { 
            width: 100%; padding: 18px; background: var(--red); color: white; border: none; 
            cursor: pointer; font-family: 'Cinzel', serif; font-size: 1.5rem; 
            border-radius: 8px; transition: 0.3s;
        }
        .submit-btn:hover { background: var(--gold); color: black; transform: scale(1.02); }

        .shake { animation: shake 0.4s; border-color: var(--red) !important; }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-10px);} 50% {transform: translateX(10px);} 75% {transform: translateX(-10px);} }
        
        /* KILL FEED (СМЕШНЫЕ ВСТАВКИ) */
        .kill-feed {
            position: fixed; z-index: 1000; font-family: 'Cinzel', serif; font-size: 1.5rem; font-weight: bold;
            color: white; text-shadow: 2px 2px 5px black, 0 0 10px rgba(0,0,0,0.8);
            background: rgba(0, 0, 0, 0.7); border-left: 5px solid var(--red);
            padding: 12px 25px; border-radius: 4px; pointer-events: none; opacity: 0;
            animation: killFeedAnim 5s ease-in-out forwards;
        }
        @keyframes killFeedAnim {
            0% { opacity: 0; transform: translateY(30px) scale(0.8); }
            10% { opacity: 1; transform: translateY(0) scale(1.1); }
            15% { transform: scale(1); }
            80% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-30px); }
        }

        /* МЕДИА */
        .reveal-media { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 100px; height: 100px; z-index: 10000; opacity: 0; 
            transition: all 2s ease-in-out; border: 5px solid var(--gold); display: none; 
            background-color: #000; object-fit: contain; pointer-events: none;
        }
        .reveal-media.expanded { width: 100vw; height: 100vh; opacity: 1; }
        @keyframes moveLR { from { left: -600px; transform: rotate(-5deg); } to { left: 110vw; transform: rotate(5deg); } }
        @keyframes moveTB { from { top: -600px; transform: rotate(-5deg); } to { top: 110vh; transform: rotate(5deg); } }
        @keyframes moveRL { from { left: 110vw; transform: rotate(5deg); } to { left: -600px; transform: rotate(-5deg); } }
        @keyframes moveBT { from { top: 110vh; transform: rotate(5deg); } to { top: -600px; transform: rotate(-5deg); } }
    </style>
</head>
<body>

    <div id="start-overlay">
        <div class="overlay-content">
            <h1>Congrats Илья and Алиса<br>happy birthday</h1>
            <button id="start-btn" disabled onclick="startExperience()">Вперед (60)</button>
            <div id="terminal"></div>
        </div>
    </div>

    <!-- МУЗЫКА -->
    <audio id="audio" preload="auto"></audio>
    
    <img id="reveal-img-1" class="reveal-media" src="a1.jpg" loading="eager">
    <img id="reveal-img-2" class="reveal-media" src="a2.png" loading="eager">
    <video id="reveal-vid-3" class="reveal-media" src="bu.mp4" preload="auto"></video>

    <div class="lane-container" id="progress">
        <div class="lane-line"></div>
        <div class="checkpoint active"></div><div class="checkpoint"></div><div class="checkpoint"></div>
        <div class="checkpoint"></div><div class="checkpoint"></div><div class="checkpoint"></div>
        <div class="checkpoint"></div><div class="checkpoint"></div><div class="checkpoint"></div>
        <div class="checkpoint"></div>
        
        <!-- СИММЕТРИЧНЫЙ ЗАМОК -->
        <div class="lock"></div>
        
        <div class="avatar ilya" id="avatar-ilya" style="left: 0%;">
            Илья
            <div class="tooltip">Парень с душой размером с океан. Рядом с ним чувствуешь себя как за каменной стеной (даже если стена постоянно шутит)</div>
        </div>
        <div class="avatar alice" id="avatar-alice" style="left: 0%;">
            Алиса
            <div class="tooltip">Лучик света. С ней любой день становится ярче, а любая неудача — пустяком</div>
        </div>
    </div>

    <div class="content" id="main-content">
        <div id="quiz-area"></div>
    </div>

    <script>
        // ЛОГИКА ТЕРМИНАЛА 
        const terminalLogs = [
            "[SYS] Инициализация тайного лобби...",
            "[SYS] Подключение к серверам Dota 2...",
            "<span class='log-err'>[ERROR] Илья снова ферст-пикнул Techies. Команда пишет 'GG' до выхода крипов.</span>",
            "[WAIT] Расстановка мин по всему лесу. Лесник плачет в углу...",
            "<span class='log-warn'>[OK] Алиса взяла Witch Doctor. Ситуация под контролем.</span>",
            "[WAIT] Брошен кокос! Летит... летит... отскок в лесного крипа. Классика.",
            "[SYS] Оооояяяяя! Загрузка касочек... Эффективность хила 146%.",
            "<span class='log-err'>[ERROR] Илья заминировал Рошпит. Сервер лагает от количества бочек.</span>",
            "[SYS] Поиск команды... Найдены 4 подпиваса.",
            "[WAIT] Алиса ставит Death Ward (WUB WUB WUB). Раздаются крики врагов.",
            "<span class='log-warn'>[INFO] Илья делает суицид (Blast Off!) в толпу. Никто не умер, но было эффектно.</span>",
            "[SYS] Покупка вардов... Ошибка: саппорты покупают Аганим.",
            "[OK] Подключение к голосовому чату. Обнаружены неадекваты. Мут всех.",
            "[WAIT] Алиса хилит команду... Команда с криками убегает от хила.",
            "<span class='log-err'>[ERROR] Минёр в команде = игра на 2 часа. Заказывайте пиццу.</span>",
            "[SYS] Вражеский керри наступил на красную мину. Минус нервы.",
            "[SYS] Синхронизация общих воспоминаний...",
            "<span class='log-warn'>[OK] Проверка файлов завершена. Защита активна.</span>",
            "<span class='log-warn'>[SYS] Готовность 100%. Нажмите ВПЕРЕД, чтобы начать.</span>"
        ];
        
        const terminal = document.getElementById('terminal');
        let logIndex = 0;
        const logTimer = setInterval(() => {
            if (logIndex < terminalLogs.length) {
                const line = document.createElement('div');
                line.className = 'log-line';
                line.innerHTML = terminalLogs[logIndex];
                terminal.appendChild(line);
                terminal.scrollTop = terminal.scrollHeight;
                logIndex++;
            } else {
                clearInterval(logTimer);
            }
        }, 3100);

        // ТАЙМЕР ЗАГРУЗКИ 60 СЕКУНД
        let timeLeft = 60;
        const startBtn = document.getElementById('start-btn');
        const timerInterval = setInterval(() => {
            timeLeft--;
            startBtn.innerText = `Вперед (${timeLeft})`;
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                startBtn.disabled = false;
                startBtn.innerText = "Вперед";
                startBtn.style.transform = "scale(1.1)";
            }
        }, 1000);

        // ЛОГИКА KILL FEED (НЕ ПЕРЕКРЫВАЕТ ЦЕНТР)
        const killFeedTexts = [
            "<span style='color: #c23c2a;'>FIRST BLOOD!</span> Алиса застилила фраг у керри.",
            "<span style='color: #e5c07b;'>DOUBLE KILL!</span> Илья подорвал курьера с чужими шмотками.",
            "<span style='color: #c23c2a;'>TRIPLE KILL!</span> Кокос Алисы бесконечно скачет по троим.",
            "<span style='color: #ff00ff;'>RAMPAGE!</span> Илья заминировал фонтан и взорвал всю команду!",
            "<span style='color: #ffaa00;'>GODLIKE!</span> Алиса выхилила тимейта с 1 ХП.",
            "<span style='color: #00ffff;'>HOLY SHIT!</span> Илья купил Рапиру на Минёра!",
            "<span style='color: #c23c2a;'>OWNAGE!</span> Враги ливнули из-за мин в лесу."
        ];

        function spawnKillFeed() {
            const text = killFeedTexts[Math.floor(Math.random() * killFeedTexts.length)];
            const feed = document.createElement('div');
            feed.className = 'kill-feed';
            feed.innerHTML = text;
            
            const zone = Math.floor(Math.random() * 4);
            let topPos, leftPos;
            
            if (zone === 0) { // Верх
                topPos = Math.random() * 10 + 5; 
                leftPos = Math.random() * 60 + 10; 
            } else if (zone === 1) { // Низ
                topPos = Math.random() * 10 + 80; 
                leftPos = Math.random() * 60 + 10; 
            } else if (zone === 2) { // Лево
                topPos = Math.random() * 50 + 20; 
                leftPos = Math.random() * 10 + 5; 
            } else { // Право
                topPos = Math.random() * 50 + 20; 
                leftPos = Math.random() * 10 + 75; 
            }
            
            feed.style.top = topPos + 'vh';
            feed.style.left = leftPos + 'vw';
            
            document.body.appendChild(feed);
            feed.addEventListener('animationend', () => feed.remove());
        }

        const audio = document.getElementById('audio');
        const playlist = ["Nickelback.mp3", "Gorillaz.mp3", "Bodies.mp3", "ak47.mp3", "paparoach.mp3"];
        let currentTrack = 0;
        let currentStep = 1;
        let isSpecialAudioPlaying = false; 

        let audioCtx;
        let analyser;
        let dataArray;
        let currentPhotoIndex = 1;
        let isRandomPhotos = false;

        function changeTrackWithFade() {
            if (isSpecialAudioPlaying) return; 
            let fadeOut = setInterval(() => {
                if (audio.volume > 0.02) { audio.volume -= 0.02; } 
                else {
                    audio.volume = 0;
                    clearInterval(fadeOut);
                    currentTrack = (currentTrack + 1) % playlist.length;
                    audio.src = playlist[currentTrack];
                    audio.play();
                    let fadeIn = setInterval(() => {
                        if (audio.volume < 0.13) { audio.volume += 0.02; } 
                        else { audio.volume = 0.15; clearInterval(fadeIn); }
                    }, 100);
                }
            }, 100);
        }

        setInterval(changeTrackWithFade, 60000);
        audio.addEventListener('ended', changeTrackWithFade);

        let animDirection = 0;
        setInterval(() => { animDirection = (animDirection + 1) % 4; }, 10000); 

        // ИСПРАВЛЕН ВОПРОС ПРО АНТОНА
        const quizData = [
            { q: "Кто озвучивает фразу 'я люблю когда гмом'?", a: ["анастасия", "настя", "настена"] },
            { q: "Как ты обычно с нами здороваешься, когда заходишь?", a: ["привет", "привет ребята", "привет, ребята"] },
            { q: "В каком году был первый матч Антона с Алисой?", a: ["2024"] },
            { q: "Вопрос 4", a: ["ответ4"] },
            { q: "Вопрос 5", a: ["ответ5"] },
            { q: "Вопрос 6", a: ["ответ6"] },
            { q: "Вопрос 7", a: ["ответ7"] },
            { q: "Вопрос 8", a: ["ответ8"] },
            { q: "Вопрос 9", a: ["ответ9"] },
            { q: "Вопрос 10", a: ["ответ10"] }
        ];

        const quizArea = document.getElementById('quiz-area');
        quizData.forEach((item, index) => {
            const stepDiv = document.createElement('div');
            stepDiv.className = 'step';
            stepDiv.id = 'step' + (index + 1);
            if(index === 0) stepDiv.classList.add('active');
            
            stepDiv.innerHTML = `
                <p>${item.q}</p>
                <input type="text" id="answer${index + 1}" placeholder="Ваш ответ..." 
                       onkeydown="if(event.key === 'Enter') checkAnswer(${index + 1})" autofocus>
                <button class="submit-btn" onclick="checkAnswer(${index + 1})">Проверить</button>
            `;
            quizArea.appendChild(stepDiv);
        });

        function spawnPhoto() {
            let i;
            if (!isRandomPhotos) {
                i = currentPhotoIndex;
                currentPhotoIndex++;
                if (currentPhotoIndex > 31) {
                    isRandomPhotos = true; 
                }
            } else {
                i = Math.floor(Math.random() * 31) + 1;
            }

            const img = document.createElement('img');
            img.src = `p${i}.jpg`;
            img.className = 'falling-photo';
            img.style.width = (Math.floor(Math.random() * 400) + 300) + 'px'; 
            
            let animName = '';
            if (animDirection === 0) { img.style.top = (Math.random() * 80) + 'vh'; animName = 'moveLR'; } 
            else if (animDirection === 1) { img.style.left = (Math.random() * 90) + 'vw'; animName = 'moveTB'; } 
            else if (animDirection === 2) { img.style.top = (Math.random() * 80) + 'vh'; animName = 'moveRL'; } 
            else if (animDirection === 3) { img.style.left = (Math.random() * 90) + 'vw'; animName = 'moveBT'; }

            document.body.appendChild(img);
            setTimeout(() => {
                img.style.animation = `${animName} ${Math.random() * 6 + 6}s linear`;
                img.style.opacity = '0.5'; 
            }, 50);
            img.addEventListener('animationend', () => img.remove());
        }

        // ОБНОВЛЕННЫЙ, ЧЕТКИЙ И РЕЗКИЙ АУДИО ВИЗУАЛИЗАТОР
        function initVisualizer() {
            if (audioCtx) return; 
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioCtx.createMediaElementSource(audio);
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 256;
            source.connect(analyser);
            analyser.connect(audioCtx.destination);
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            
            visualizeLoop();
        }

        function visualizeLoop() {
            requestAnimationFrame(visualizeLoop);
            if (!analyser) return;
            analyser.getByteFrequencyData(dataArray);

            // Разделяем частоты: Глубокий бас (для удара/размера) и Средний бас (для свечения)
            let deepBassSum = 0;
            for(let i = 1; i <= 5; i++) deepBassSum += dataArray[i];
            let deepBassAvg = deepBassSum / 5; 

            let midBassSum = 0;
            for(let i = 6; i <= 15; i++) midBassSum += dataArray[i];
            let midBassAvg = midBassSum / 10;

            const activeStep = document.querySelector('.step.active');

            if (activeStep) {
                if (deepBassAvg < 15 && midBassAvg < 15) {
                    // Спокойное состояние (тишина)
                    activeStep.style.boxShadow = `0 0 20px rgba(0,0,0,0.9)`;
                    activeStep.style.transform = `scale(1)`;
                    activeStep.style.borderColor = `#444`;
                } else {
                    // Возведение в степень дает эффект РЕЗКОГО всплеска (нелинейность)
                    const intensity = Math.pow(deepBassAvg / 255, 1.2); 
                    const midIntensity = Math.pow(midBassAvg / 255, 1.2);

                    const scale = 1 + (intensity * 0.05); // Резкий прыжок размера
                    const coreGlow = 5 + (intensity * 15); // Белое/светлое ядро свечения
                    const midGlow = 20 + (midIntensity * 40); // Золотое свечение
                    const outerGlow = 40 + (intensity * 80); // Красная аура

                    activeStep.style.boxShadow = `
                        0 0 ${coreGlow}px rgba(255, 235, 180, ${0.4 + intensity * 0.6}), 
                        0 0 ${midGlow}px rgba(229, 192, 123, ${0.3 + midIntensity * 0.5}), 
                        0 0 ${outerGlow}px rgba(194, 60, 42, ${0.2 + intensity * 0.4}),
                        inset 0 0 ${15 + intensity * 20}px rgba(229, 192, 123, ${0.2 + intensity * 0.3})
                    `;
                    activeStep.style.transform = `scale(${scale})`;
                    activeStep.style.borderColor = `rgba(229, 192, 123, ${0.5 + intensity})`;
                }
            }
        }

        function startExperience() {
            audio.volume = 0.15;
            audio.src = playlist[currentTrack];
            audio.play(); 
            
            initVisualizer();

            document.getElementById('start-overlay').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            
            setTimeout(() => document.getElementById('answer1').focus(), 100);
            
            setInterval(spawnPhoto, 2000); 
            setInterval(spawnKillFeed, 7000);
        }

        async function checkAnswer(step) {
            const inputField = document.getElementById('answer' + step);
            const val = inputField.value.toLowerCase().trim();
            
            if (quizData[step-1].a.includes(val)) {
                
                if (step === 1) {
                    isSpecialAudioPlaying = true; audio.pause();
                    const quote = new Audio('gol.mp3');
                    const media = document.getElementById('reveal-img-1'); 
                    media.style.display = 'block'; setTimeout(() => media.classList.add('expanded'), 50);
                    quote.play();
                    quote.onended = () => { 
                        media.classList.remove('expanded'); media.style.display = 'none'; 
                        audio.volume = 0.15; audio.play(); isSpecialAudioPlaying = false; nextStep(); 
                    };
                } 
                else if (step === 2) {
                    isSpecialAudioPlaying = true; audio.pause();
                    const quote2 = new Audio('Privet.mp3');
                    const media = document.getElementById('reveal-img-2'); 
                    media.style.display = 'block'; setTimeout(() => media.classList.add('expanded'), 50);
                    quote2.play();
                    
                    // РОВНО 4 СЕКУНДЫ
                    setTimeout(() => { 
                        quote2.pause();
                        quote2.currentTime = 0;
                        media.classList.remove('expanded'); 
                        media.style.display = 'none'; 
                        audio.volume = 0.15; 
                        audio.play(); 
                        isSpecialAudioPlaying = false; 
                        nextStep(); 
                    }, 4000);
                } 
                else if (step === 3) {
                    isSpecialAudioPlaying = true; audio.pause(); 
                    const media = document.getElementById('reveal-vid-3'); 
                    media.style.display = 'block'; setTimeout(() => media.classList.add('expanded'), 50);
                    media.play();
                    media.onended = () => { 
                        media.classList.remove('expanded'); media.style.display = 'none'; 
                        audio.volume = 0.15; audio.play(); isSpecialAudioPlaying = false; nextStep(); 
                    };
                }
                else { nextStep(); }
                
                inputField.value = ''; 
                
            } else { 
                inputField.classList.add('shake');
                setTimeout(() => inputField.classList.remove('shake'), 400);
            }
        }

        // ИСПРАВЛЕН БАГ С ЗАВИСАНИЕМ ВИЗУАЛИЗАТОРА ПОСЛЕ 1 ВОПРОСА
        function nextStep() {
            const oldStep = document.getElementById('step' + currentStep);
            oldStep.style.display = 'none';
            oldStep.classList.remove('active'); // Обязательно убираем класс active у старого вопроса!
            
            currentStep++;
            
            if (currentStep <= 10) {
                const newStep = document.getElementById('step' + currentStep);
                newStep.classList.add('active'); // Добавляем новому
                
                setTimeout(() => document.getElementById('answer' + currentStep).focus(), 100);
                
                const avatars = [document.getElementById('avatar-ilya'), document.getElementById('avatar-alice')];
                
                const pos = (currentStep - 1) * 10;
                avatars.forEach(av => {
                    av.classList.add('running');
                    av.style.left = pos + '%';
                });
                
                setTimeout(() => {
                    avatars.forEach(av => av.classList.remove('running'));
                }, 800);
                
                const flags = document.querySelectorAll('.checkpoint');
                flags[currentStep - 1].classList.add('active');
            } else {
                const avatars = [document.getElementById('avatar-ilya'), document.getElementById('avatar-alice')];
                avatars.forEach(av => {
                    av.classList.add('running');
                    av.style.left = '100%';
                });
                
                setTimeout(() => {
                    avatars.forEach(av => av.classList.remove('running'));
                    alert("GG WP! Защита снята. Код: 732");
                }, 800);
            }
        }
    </script>
