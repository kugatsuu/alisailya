<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Dota 2: Legendary Gift</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@900&family=Roboto:wght@400&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0d1117; --gold: #e5c07b; --red: #c23c2a; }
        body { margin: 0; background: var(--bg); font-family: 'Roboto', sans-serif; color: #e2d6b5; overflow: hidden; min-height: 100vh; }

        #start-overlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; justify-content: center; align-items: center; text-align: center; }
        .overlay-content h1 { 
            font-family: 'Cinzel', serif; font-size: 4rem; margin-bottom: 40px; color: #fff;
            text-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 30px var(--gold), 0 0 40px var(--gold);
        }
        button { 
            background: transparent; color: var(--gold); border: 2px solid var(--gold); 
            padding: 20px 60px; font-family: 'Cinzel', serif; font-size: 1.5rem; cursor: pointer; 
            border-radius: 5px; transition: 0.3s; text-transform: uppercase; box-shadow: 0 0 10px var(--gold);
        }
        button:hover { background: var(--gold); color: black; transform: scale(1.1); }

        /* Фото скрыты по умолчанию */
        .falling-photo { 
            position: fixed; 
            border: 2px solid var(--gold); 
            z-index: 1; 
            pointer-events: none;
            opacity: 0; 
            transition: opacity 0.8s ease;
        }

        .content { position: relative; z-index: 10; padding: 50px 20px; max-width: 600px; margin: 0 auto; display: none; }
        h1 { font-family: 'Cinzel', serif; color: var(--gold); text-align: center; border-bottom: 2px solid var(--red); }
        .step { background: rgba(22, 27, 34, 0.85); padding: 30px; border-radius: 10px; border: 1px solid #333; margin-top: 20px; display: none; }
        .step.active { display: block; }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid var(--gold); color: white; border-radius: 4px; box-sizing: border-box; }
        .submit-btn { margin-top: 15px; width: 100%; background: var(--red); color: white; border: none; padding: 12px; cursor: pointer; border-radius: 4px; }
        
        #reveal-img {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 100px; height: 100px; z-index: 10000; opacity: 0;
            transition: all 4s ease-in-out; border: 5px solid var(--gold); display: none;
        }
        #reveal-img.expanded { width: 100vw; height: 100vh; opacity: 1; }
    </style>
</head>
<body>

    <div id="start-overlay">
        <div class="overlay-content">
            <h1>Congrats Илья and Алиса<br>happy birthday</h1>
            <button onclick="startExperience()">Вперед</button>
        </div>
    </div>

    <audio id="audio"></audio>
    <img id="reveal-img" src="a1.jpg">

    <div class="content" id="main-content">
        <h1>Тайная Лавка</h1>
        <div id="step1" class="step active">
            <p>Кто озвучивает фразу "я люблю когда гмом"?</p>
            <input type="text" id="answer1" placeholder="Ответ...">
            <button class="submit-btn" onclick="checkAnswer(1)">Проверить</button>
        </div>
        <div id="step2" class="step">
            <p>Вопрос 2: Впиши вопрос?</p>
            <input type="text" id="answer2" placeholder="Ответ...">
            <button class="submit-btn" onclick="checkAnswer(2)">Проверить</button>
        </div>
    </div>

    <script>
        const audio = document.getElementById('audio');
        const playlist = ["Bodies.mp3", "Gorillaz.mp3", "Nickelback.mp3"];
        let currentTrack = 0;

        audio.onended = () => { 
            currentTrack = (currentTrack + 1) % playlist.length; 
            audio.src = playlist[currentTrack]; 
            audio.play(); 
        };

        // Загрузка фото от p1 до p23
        const photoFiles = [];
        for(let i = 1; i <= 23; i++) { photoFiles.push(`p${i}.jpg`); }
        
        const answers = { 1: ["анастасия"], 2: ["ответ2"] };

        function startExperience() {
            audio.volume = 0.25; // Уменьшил громкость до 25%
            audio.src = playlist[currentTrack];
            audio.play();
            
            document.getElementById('start-overlay').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            
            photoFiles.forEach((file, i) => {
                const img = document.createElement('img');
                img.src = file;
                img.className = 'falling-photo';
                
                // --- НАСТРОЙКИ СТИЛЯ ДО ВСТАВКИ В ДОМ ---
                img.style.position = 'fixed';
                img.style.top = '-800px'; 
                img.style.left = (Math.random() * 80) + 'vw';
                img.style.width = (Math.floor(Math.random() * 300) + 300) + 'px';
                
                // Добавляем на страницу
                document.body.appendChild(img);
                
                // Запуск анимации через короткий таймаут
                setTimeout(() => {
                    img.style.animation = `fall ${Math.random() * 5 + 5}s linear infinite`;
                    img.style.animationDelay = (i * 0.8) + 's';
                    img.style.opacity = '0.25';
                }, 50);
            });
        }

        // Анимация падения
        const style = document.createElement('style');
        style.innerHTML = `@keyframes fall { from { top: -800px; } to { top: 110vh; } }`;
        document.head.appendChild(style);

        async function checkAnswer(step) {
            const val = document.getElementById('answer' + step).value.toLowerCase().trim();
            if (answers[step].includes(val)) {
                if (step === 1) {
                    audio.pause(); 
                    const quote = new Audio('gol.mp3');
                    const img = document.getElementById('reveal-img');
                    img.style.display = 'block';
                    
                    setTimeout(() => img.classList.add('expanded'), 50);
                    quote.play();
                    
                    quote.onended = () => {
                        img.classList.remove('expanded');
                        img.style.display = 'none';
                        audio.play(); 
                        document.getElementById('step1').style.display = 'none';
                        document.getElementById('step2').classList.add('active');
                    };
                } else {
                    alert("GG WP! Защита снята. Код: 732");
                }
            } else { alert("Неверно!"); }
        }
    </script>
</body>
</html>
